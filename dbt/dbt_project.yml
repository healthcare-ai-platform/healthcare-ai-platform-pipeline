name: healthcare_pipeline
version: "1.0.0"
config-version: 2

profile: healthcare

model-paths: ["models"]
test-paths:  ["tests"]
macro-paths: ["macros"]
seed-paths:  ["seeds"]

models:
  healthcare_pipeline:
    staging:
      +materialized: view           # always live — reads directly from RAW
      +schema: staging
    intermediate:
      +materialized: view           # always live — joins on staging views
      +schema: intermediate
    marts:
      +materialized: dynamic_table  # Snowflake auto-refreshes every 30 seconds
      +target_lag: "30 seconds"
      +snowflake_warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'COMPUTE_WH') }}"
      +schema: marts
